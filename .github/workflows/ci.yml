name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    # The in-process engines ship per-platform native binaries, so exercise
    # install + tests + boot on all three target OSes, not just Linux.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - run: npm test
      # Electron needs a display; Linux runners are headless so wrap with xvfb.
      - name: Smoke test (headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a npx electron . --smoke-test --no-sandbox
      - name: Smoke test
        if: runner.os != 'Linux'
        run: npx electron . --smoke-test --no-sandbox
      # Boot the engine utilityProcess worker, round-trip a ping, and load both
      # native addons, so a broken worker or an addon that no longer links
      # against this Electron's ABI surfaces here rather than at runtime.
      - name: Engine worker boot (headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a npx electron scripts/engine-smoke.js --no-sandbox
      - name: Engine worker boot
        if: runner.os != 'Linux'
        run: npx electron scripts/engine-smoke.js --no-sandbox
      # Drive the real overlay page against Chromium's fake audio device and
      # verify the capture/UI sync contract: "Listening…" appears only once
      # samples actually flow, and the captured WAV covers everything said
      # from that moment on.
      - name: Overlay capture sync (headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a npx electron scripts/overlay-smoke.js --no-sandbox
      - name: Overlay capture sync
        if: runner.os != 'Linux'
        run: npx electron scripts/overlay-smoke.js --no-sandbox

  stt-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stt-server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Install
        run: uv venv && uv pip install -e .
      - name: Import check
        run: uv run python -c "from earheart_stt.server import create_app; create_app()"
