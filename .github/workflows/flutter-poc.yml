# CI for the experimental Flutter rewrite proof-of-concept (flutter-app/).
# Runs only when the POC changes so Electron PRs are unaffected.
name: flutter-poc

on:
  push:
    branches: [master]
    paths: ["flutter-app/**", ".github/workflows/flutter-poc.yml"]
  pull_request:
    paths: ["flutter-app/**", ".github/workflows/flutter-poc.yml"]

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: flutter-app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev \
            libkeybinder-3.0-dev libayatana-appindicator3-dev xvfb

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build (Linux release)
        run: flutter build linux --release

      - name: Smoke test (headless boot)
        run: |
          xvfb-run -a build/linux/x64/release/bundle/earheart --smoke-test \
            | tee /dev/stderr | grep -q "SMOKE OK"

  windows:
    runs-on: windows-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: flutter-app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Analyze and test
        run: |
          flutter analyze
          flutter test

      - name: Build (Windows release)
        run: flutter build windows --release

      # Downloadable from the workflow-run page; contains earheart.exe plus
      # the Flutter/plugin DLLs and assets — unzip anywhere and run.
      - uses: actions/upload-artifact@v4
        with:
          name: earheart-windows-x64
          path: flutter-app/build/windows/x64/runner/Release
          if-no-files-found: error
