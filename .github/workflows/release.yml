name: Release builds

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# auto-release.yml dispatches this workflow with a tag ref (`--ref v<version>`),
# so the normal path always runs on a tag: create the release, build, publish.
# A manual workflow_dispatch against a branch is a dry-run — it builds and
# uploads CI artifacts but creates/publishes nothing (create-release is skipped
# and the build job's publish arg resolves to `never`).

permissions:
  contents: write

jobs:
  # Create the GitHub release once, up front, so the three platform build jobs
  # upload into one existing release instead of each racing to create it. When
  # they raced, concurrent release creation clobbered asset uploads — v0.6.0
  # lost its macOS dmg/zip/latest-mac.yml that way. The release is created as a
  # draft: electron-builder matches an existing draft by tag and uploads into
  # it, so the in-progress release stays hidden from users until publish-release
  # flips it live after every platform has uploaded. Only runs on a tag push.
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # No checkout: `gh` works over the API with GH_TOKEN, not the working tree.
      - name: Create the draft release if it does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # With no checkout there's no git remote for gh to infer the repo
          # from, so pass it explicitly (also matches publish-release).
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          # The tag reaches the release commands as a literal arg (env-var
          # indirection + quoting), but guard the shape anyway so a stray tag
          # can never be parsed as a flag or seed a release for a non-version
          # ref. The push trigger already filters to v*; this pins it to vN.
          if [[ ! "$tag" =~ ^v[0-9] ]]; then
            echo "Refusing to create a release for non-version tag: $tag"
            exit 1
          fi
          # Reuse an existing release so a re-run is idempotent. Note: if a prior
          # run already published this tag (non-draft), electron-builder won't
          # re-upload into a release older than 2h — re-run from a fresh tag
          # rather than re-running a long-published one.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists, reusing it."
          else
            gh release create "$tag" --draft --title "$tag" --generate-notes
          fi

  build:
    needs: create-release
    # workflow_dispatch on a branch skips create-release; don't block the build
    # job on a skipped dependency.
    if: ${{ always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    strategy:
      # One platform failing must not cancel the other platforms' uploads.
      fail-fast: false
      matrix:
        # macos-latest is Apple Silicon (arm64) — the only macOS build we ship;
        # Intel Macs run it under Rosetta. The Intel (x64) macos-13 leg was
        # dropped: its GitHub-hosted runner repeatedly sat queued with no host,
        # which left the publish-release gate (needs all builds) waiting forever
        # and stranded v0.7.0/v0.8.0 as unpublished drafts.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - run: npm ci
      # On a tag, publish installers to the GitHub release; a plain
      # workflow_dispatch on a branch only uploads CI artifacts.
      - run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: earheart-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: ignore

  # Flip the draft release live once every platform has uploaded its installers,
  # so users never see a release with a missing platform mid-build. Runs only on
  # a tag push (create-release ran) and only if all build jobs succeeded — a
  # failed platform leaves the release as a draft to fix rather than shipping a
  # partial release.
  publish-release:
    needs: [create-release, build]
    # always() so this is evaluated explicitly (mirrors the build job); the
    # success-of-both gate then publishes only when every platform uploaded.
    if: ${{ always() && needs.create-release.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --repo "$GITHUB_REPOSITORY"
