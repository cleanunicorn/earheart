name: earheart
description: Private, hotkey-driven voice dictation for your desktop (Flutter rewrite proof-of-concept).
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  window_manager: ^0.5.1
  screen_retriever: ^0.2.0
  tray_manager: ^0.5.3
  hotkey_manager: ^0.2.3
  record: ^7.1.1
  sherpa_onnx: ^1.13.3
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
