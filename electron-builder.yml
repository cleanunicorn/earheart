appId: dev.cleanunicorn.earheart
productName: Earheart
copyright: Copyright © 2026 Earheart contributors

directories:
  output: dist
  buildResources: build

# Where `electron-builder --publish` uploads installers. releaseType: release
# publishes immediately (not a draft) so tag builds are fully automatic.
publish:
  provider: github
  releaseType: release

files:
  - main/**/*
  - renderer/**/*
  - preload.js
  - assets/**/*
  - package.json

# The in-process engines ship native addons (.node) and shared libraries
# (.so/.dylib/.dll) that the OS loader must read from real files on disk, not
# from inside the asar archive. Unpack them so sherpa-onnx (STT) and
# node-llama-cpp (cleanup) load at runtime. Production deps are bundled
# automatically; models are downloaded at first run, not packaged.
asarUnpack:
  - "**/*.node"
  - "node_modules/sherpa-onnx-node/**"
  - "node_modules/sherpa-onnx-*/**"
  - "node_modules/node-llama-cpp/**"
  - "node_modules/@node-llama-cpp/**"

linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: assets/icon.png
  synopsis: Private, hotkey-driven voice dictation
  desktop:
    entry:
      StartupWMClass: earheart

# The release matrix builds macOS on two runners — arm64 on macos-latest and
# x64 on the Intel macos-13 runner — so the per-arch native addons
# (sherpa-onnx-darwin-* and @node-llama-cpp/mac-*) are the ones npm actually
# installed on that host. Each run defaults to the host arch; cross-compiling
# both from one runner would bundle the wrong-arch native binaries.
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: assets/icon.png
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Earheart records your voice while dictating so it can be transcribed.

win:
  target:
    - nsis
    - portable
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
