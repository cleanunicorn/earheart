appId: dev.cleanunicorn.earheart
productName: Earheart
copyright: Copyright © 2026 Earheart contributors

directories:
  output: dist
  buildResources: build

# Where `electron-builder --publish` uploads installers. releaseType: release
# publishes immediately (not a draft) so tag builds are fully automatic.
publish:
  provider: github
  releaseType: release

files:
  - main/**/*
  - renderer/**/*
  - preload.js
  - assets/**/*
  - package.json

# The in-process engines ship native addons (.node) and shared libraries
# (.so/.dylib/.dll) that the OS loader must read from real files on disk, not
# from inside the asar archive. Unpack them so sherpa-onnx (STT) and
# node-llama-cpp (cleanup) load at runtime. Production deps are bundled
# automatically; models are downloaded at first run, not packaged.
asarUnpack:
  - "**/*.node"
  - "node_modules/sherpa-onnx-node/**"
  - "node_modules/sherpa-onnx-*/**"
  - "node_modules/node-llama-cpp/**"
  - "node_modules/@node-llama-cpp/**"

linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: assets/icon.png
  synopsis: Private, hotkey-driven voice dictation
  desktop:
    entry:
      StartupWMClass: earheart

# macOS builds on macos-latest (arm64) only; the build defaults to the host arch,
# so the per-arch native addons (sherpa-onnx-darwin-arm64 and
# @node-llama-cpp/mac-arm64) npm installed on that host are the ones that ship.
# Cross-compiling x64 from this runner would bundle the wrong-arch native
# binaries, so we don't — Intel Macs run the arm64 build under Rosetta. (The
# x64 macos-13 runner was dropped from the release matrix; see release.yml.)
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: assets/icon.png
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Earheart records your voice while dictating so it can be transcribed.

win:
  target:
    - nsis
    - portable
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
