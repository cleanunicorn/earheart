appId: dev.cleanunicorn.earheart
productName: Earheart
copyright: Copyright © 2026 Earheart contributors

directories:
  output: dist
  buildResources: build

# Where `electron-builder --publish` uploads installers. releaseType: release
# publishes immediately (not a draft) so tag builds are fully automatic.
publish:
  provider: github
  releaseType: release

files:
  - main/**/*
  - renderer/**/*
  - preload.js
  - assets/**/*
  - package.json

# The in-app STT (sherpa-onnx) and cleanup (node-llama-cpp) engines load native
# binaries (.node/.so/.dylib/.dll) at runtime; those cannot be read from inside
# the asar archive, so unpack them. The platform-specific binaries live in
# scoped/sibling packages (sherpa-onnx-<platform>, @node-llama-cpp/*).
asarUnpack:
  - "node_modules/sherpa-onnx-node/**"
  - "node_modules/sherpa-onnx-*/**"
  - "node_modules/node-llama-cpp/**"
  - "node_modules/@node-llama-cpp/**"

linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: assets/icon.png
  synopsis: Private, hotkey-driven voice dictation
  desktop:
    entry:
      StartupWMClass: earheart

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: assets/icon.png
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Earheart records your voice while dictating so it can be transcribed.

win:
  target:
    - nsis
    - portable
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
